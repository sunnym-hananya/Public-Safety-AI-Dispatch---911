<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSAP Context Transfer AI - Demo</title>

    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Esri Leaflet (raster basemaps, no API key required) -->
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>

    <!-- Leaflet.heat (heatmap layer) -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="root"></div>

    <!--
        Script load order matters: each file relies on globals defined by earlier scripts.
        constants.js → utils.js → components (leaf → composite) → App.jsx
    -->

    <!-- Shared constants (no JSX) -->
    <script src="./src/constants.js"></script>

    <!-- Utility functions (no JSX) -->
    <script src="./src/utils.js"></script>

    <!-- Leaf components (no inter-component dependencies) -->
    <script type="text/babel" src="./src/components/ConfidenceBadge.jsx"></script>
    <script type="text/babel" src="./src/components/WorkflowProgress.jsx"></script>
    <script type="text/babel" src="./src/components/ExtractionField.jsx"></script>
    <script type="text/babel" src="./src/components/MapSection.jsx"></script>
    <script type="text/babel" src="./src/components/IncomingCallScreen.jsx"></script>
    <script type="text/babel" src="./src/components/CallPanel.jsx"></script>
    <script type="text/babel" src="./src/components/LiveExtractionPanel.jsx"></script>

    <!-- Page-section components (depend on leaf components above) -->
    <script type="text/babel" src="./src/components/TranscriptCard.jsx"></script>
    <script type="text/babel" src="./src/components/VerificationReport.jsx"></script>
    <script type="text/babel" src="./src/components/CadSection.jsx"></script>
    <script type="text/babel" src="./src/components/DispatchRecommendations.jsx"></script>
    <script type="text/babel" src="./src/components/ImpactStats.jsx"></script>

    <!-- Error handling & observability components -->
    <script type="text/babel" src="./src/components/ErrorBoundary.jsx"></script>
    <script type="text/babel" src="./src/components/ToastContainer.jsx"></script>
    <script type="text/babel" src="./src/components/WorkflowLog.jsx"></script>

    <!-- Transparency & history components -->
    <script type="text/babel" src="./src/components/WorkflowTimeline.jsx"></script>
    <script type="text/babel" src="./src/components/MetricsDashboard.jsx"></script>
    <script type="text/babel" src="./src/components/WorkflowHistory.jsx"></script>

    <!-- Root application -->
    <script type="text/babel" src="./src/App.jsx"></script>
</body>
</html>
